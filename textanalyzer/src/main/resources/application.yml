spring:
 application:
  name: textanalyzer
 datasource:
    url: jdbc:h2:mem:textdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
 jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
 h2:
    console:
      enabled: true
      path: /h2-console

 logging:
  level:
    org.hibernate.SQL: debug